<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Read Receipts</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #12151c;
    --border: #232733;
    --text: #e6e9ef;
    --muted: #8a8f9c;
    --accent: #4f8cff;
    --good: #34c77b;
    --bad: #5b6070;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 24px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header .meta { color: var(--muted); font-size: 13px; }
  main { padding: 24px 32px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  tbody tr:hover { background: var(--panel); }
  tbody td { padding: 12px; vertical-align: top; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 500;
  }
  .badge.opened { background: rgba(52, 199, 123, 0.15); color: var(--good); }
  .badge.unopened { background: rgba(91, 96, 112, 0.2); color: var(--bad); }
  .subject { font-weight: 500; }
  .to { color: var(--muted); font-size: 12px; }
  .detail-row td {
    background: var(--panel);
    padding: 0 12px 16px 12px;
  }
  .opens-list { font-size: 13px; color: var(--muted); }
  .opens-list div { padding: 6px 0; border-bottom: 1px dashed var(--border); }
  .opens-list div:last-child { border-bottom: none; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
  .refresh { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
  <header>
    <h1>Read Receipts</h1>
    <span class="meta" id="refreshedAt"></span>
  </header>
  <main>
    <table>
      <thead>
        <tr>
          <th>Recipient</th>
          <th>Sent (IST)</th>
          <th>Status</th>
          <th>Opens</th>
          <th>Last Opened (IST)</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none">No tracked emails yet.</div>
  </main>

<script>
  async function load() {
    const res = await fetch('/api/opens');
    const data = await res.json();
    render(data);
    document.getElementById('refreshedAt').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-IN', { timeZone: 'Asia/Kolkata' });
  }

  function render(items) {
    const rows = document.getElementById('rows');
    const empty = document.getElementById('emptyState');
    rows.innerHTML = '';

    if (!items.length) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    items.forEach((item) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <div class="subject">${escapeHtml(item.subject || '(no subject)')}</div>
          <div class="to">${escapeHtml(item.to || '')}</div>
        </td>
        <td>${item.sentAtIST || '-'}</td>
        <td><span class="badge ${item.opened ? 'opened' : 'unopened'}">${item.opened ? 'Opened' : 'Not opened'}</span></td>
        <td>${item.openCount}</td>
        <td>${item.lastOpenedAtIST || '-'}</td>
      `;

      const detailTr = document.createElement('tr');
      detailTr.className = 'detail-row';
      detailTr.style.display = 'none';
      const detailTd = document.createElement('td');
      detailTd.colSpan = 5;
      if (item.opens.length) {
        detailTd.innerHTML = '<div class="opens-list">' + item.opens
          .slice()
          .reverse()
          .map((o) => `<div>${o.timestampIST} &middot; ${escapeHtml(o.browser || 'Unknown')} on ${escapeHtml(o.os || 'Unknown')} (${escapeHtml(o.device || 'Desktop')}) &middot; ${escapeHtml(o.ip || '')}</div>`)
          .join('') + '</div>';
      } else {
        detailTd.innerHTML = '<div class="opens-list">Not opened yet.</div>';
      }
      detailTr.appendChild(detailTd);

      tr.addEventListener('click', () => {
        detailTr.style.display = detailTr.style.display === 'none' ? 'table-row' : 'none';
      });

      rows.appendChild(tr);
      rows.appendChild(detailTr);
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  load();
  setInterval(load, 10000);
</script>
</body>
</html>
